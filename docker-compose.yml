version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: campus2024
      MYSQL_DATABASE: campus_trade
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - campus-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 后端
  backend:
    image: openjdk:17-jdk-slim
    container_name: campus-backend
    restart: always
    working_dir: /app
    volumes:
      - ./backend.jar:/app/app.jar
      - ./uploads:/app/uploads
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/campus_trade?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: campus2024
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    command: java -Xms256m -Xmx512m -jar app.jar
    networks:
      - campus-network

  # Nginx 前端
  frontend:
    image: nginx:alpine
    container_name: campus-frontend
    restart: always
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - campus-network

volumes:
  mysql_data:

networks:
  campus-network:
    driver: bridge
