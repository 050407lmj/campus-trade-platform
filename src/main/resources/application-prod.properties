# ========================
# 生产环境配置
# ========================

# 服务器端口
server.port=8080

# ========================
# 数据库配置
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/campus_trade?useSSL=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD  # 请修改为你的 MySQL 密码
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA 配置
# ========================
# 生产环境使用 validate 验证表结构
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# 日志配置
# ========================
# 生产环境使用 INFO 级别
logging.level.root=INFO
logging.level.com.campus.trade.backend=INFO
logging.file.name=logs/application.log

# ========================
# 安全配置
# ========================
# CORS 配置（在 CorsConfig.java 中配置）
# 允许的前端域名
cors.allowed.origins=http://your-server-ip

# ========================
# WebSocket 配置
# ========================
# WebSocket 路径
websocket.path=/ws/chat
