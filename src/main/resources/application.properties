# ========================
# 1. 服务器配置
# ========================
server.port=8080

# ========================
# 2. 数据库配置 (MySQL 8.0+)
# ========================
# url: 本地地址 + 端口 3306 + 数据库名 campus_trade
# useSSL=false: 不使用 SSL 加密
# serverTimezone=Asia/Shanghai: 设置时区为上海
# characterEncoding=utf-8: 设置字符编码
spring.datasource.url=jdbc:mysql://localhost:3306/campus_trade?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=050407lmj
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# 3. JPA 配置
# ========================
# update: 启动时更新表结构，不会删除数据
# 生产环境建议使用 validate 或 create-drop
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# 4. 日志配置
# ========================
# 开启 Lombok 注解日志
logging.level.com.campus.trade.backend=debug

# ========================
# 5. Spring MVC 配置（字符编码）
# ========================
# 强制设置 HTTP 请求和响应的字符编码为 UTF-8
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ========================
# 6. 文件上传配置
# ========================
# 单个文件最大大小
spring.servlet.multipart.max-file-size=10MB
# 多个文件总最大大小
spring.servlet.multipart.max-request-size=50MB
# 文件大小阈值，超过阈值会写入临时文件
spring.servlet.multipart.file-size-threshold=2MB
